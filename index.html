<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>公众号一键排版</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #182230;
      --muted: #697586;
      --line: #d9e3ee;
      --paper: #ffffff;
      --soft: #fff7df;
      --accent: #00a887;
      --accent-2: #ff6b57;
      --sun: #ffd45a;
      --sky: #40a9ff;
      --violet: #8e6cff;
      --shadow: 0 18px 42px rgba(42, 57, 86, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(255, 212, 90, 0.42) 0 18%, transparent 18% 100%),
        linear-gradient(225deg, rgba(64, 169, 255, 0.18) 0 24%, transparent 24% 100%),
        linear-gradient(180deg, #fffdf6 0%, #f5fbff 46%, #fff7fa 100%);
    }

    button,
    textarea,
    input,
    select {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 18px;
      align-items: center;
      padding: 18px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.7);
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.76)),
        linear-gradient(90deg, rgba(0, 168, 135, 0.18), rgba(255, 107, 87, 0.16), rgba(255, 212, 90, 0.24));
      backdrop-filter: blur(16px);
      position: sticky;
      top: 0;
      z-index: 5;
      box-shadow: 0 10px 30px rgba(42, 57, 86, 0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 8px;
      background: linear-gradient(135deg, #00a887 0%, #40a9ff 52%, #ff6b57 100%);
      box-shadow: 0 10px 24px rgba(0, 168, 135, 0.22);
      flex: none;
    }

    .mark svg {
      width: 21px;
      height: 21px;
      stroke: #ffffff;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      min-height: 38px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      border-radius: 8px;
      padding: 0 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
      user-select: none;
      box-shadow: 0 7px 18px rgba(42, 57, 86, 0.08);
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(0, 168, 135, 0.38);
      box-shadow: 0 10px 22px rgba(42, 57, 86, 0.13);
    }

    .btn svg {
      width: 17px;
      height: 17px;
      stroke-width: 2.1;
    }

    .btn.primary {
      border-color: rgba(0, 126, 102, 0.2);
      background: linear-gradient(135deg, #00a887 0%, #00b7b3 48%, #40a9ff 100%);
      color: #ffffff;
      box-shadow: 0 14px 28px rgba(0, 168, 135, 0.28);
    }

    .btn.ghost {
      width: 38px;
      padding: 0;
    }

    .btn.success {
      border-color: rgba(15, 143, 114, 0.34);
      background: #e7fff7;
      color: #08735b;
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(320px, 0.96fr) minmax(360px, 1.04fr);
      gap: 16px;
      min-height: 0;
      padding: 0 18px 18px;
    }

    .command-center {
      padding: 14px 18px 16px;
      display: grid;
      grid-template-columns: minmax(260px, 0.92fr) minmax(360px, 1.08fr);
      gap: 16px;
    }

    .workflow,
    .template-dock {
      border: 1px solid rgba(255, 255, 255, 0.82);
      background: rgba(255, 255, 255, 0.72);
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(42, 57, 86, 0.09);
      backdrop-filter: blur(14px);
    }

    .workflow {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
      align-items: stretch;
    }

    .step-card {
      border-radius: 8px;
      padding: 10px 12px;
      min-height: 68px;
      background: #ffffff;
      border: 1px solid rgba(217, 227, 238, 0.78);
      display: grid;
      align-content: center;
      gap: 4px;
    }

    .step-card strong {
      font-size: 13px;
      line-height: 1.25;
    }

    .step-card span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .step-card:nth-child(1) {
      border-color: rgba(0, 168, 135, 0.24);
      background: linear-gradient(135deg, #ffffff, #edfff9);
    }

    .step-card:nth-child(2) {
      border-color: rgba(255, 212, 90, 0.42);
      background: linear-gradient(135deg, #ffffff, #fff7dd);
    }

    .step-card:nth-child(3) {
      border-color: rgba(64, 169, 255, 0.28);
      background: linear-gradient(135deg, #ffffff, #eef8ff);
    }

    .template-dock {
      padding: 10px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .dock-title {
      min-width: 78px;
    }

    .dock-title strong {
      display: block;
      font-size: 13px;
      line-height: 1.25;
    }

    .dock-title span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }

    .template-chips {
      display: grid;
      grid-template-columns: repeat(4, minmax(72px, 1fr));
      gap: 8px;
      min-width: 0;
    }

    .template-chip {
      min-height: 54px;
      border: 1px solid rgba(217, 227, 238, 0.82);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      cursor: pointer;
      display: grid;
      justify-items: start;
      align-content: center;
      gap: 4px;
      padding: 8px 10px;
      box-shadow: 0 6px 14px rgba(42, 57, 86, 0.06);
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .template-chip:hover,
    .template-chip.active {
      transform: translateY(-1px);
      border-color: rgba(0, 168, 135, 0.44);
      box-shadow: 0 10px 20px rgba(42, 57, 86, 0.12);
    }

    .template-chip i {
      width: 28px;
      height: 6px;
      border-radius: 99px;
      display: block;
      background: var(--chip);
    }

    .template-chip span {
      font-size: 12px;
      line-height: 1.15;
      font-weight: 600;
    }

    .ai-action {
      min-height: 54px;
      border: 1px solid rgba(255, 107, 87, 0.24);
      border-radius: 8px;
      padding: 0 13px;
      color: #ffffff;
      background: linear-gradient(135deg, #ff6b57, #ff9a57);
      cursor: pointer;
      box-shadow: 0 12px 22px rgba(255, 107, 87, 0.22);
      white-space: nowrap;
    }

    .panel {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 16px 34px rgba(42, 57, 86, 0.08);
    }

    .panel.editor {
      border: 1px solid rgba(255, 255, 255, 0.76);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.84), rgba(255, 251, 236, 0.8)),
        linear-gradient(135deg, rgba(255, 212, 90, 0.22), rgba(0, 168, 135, 0.1));
    }

    .panel-head {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.74);
      min-height: 72px;
      background: rgba(255, 255, 255, 0.48);
    }

    .panel-title {
      min-width: 0;
    }

    .panel-title strong {
      display: block;
      font-size: 15px;
      line-height: 1.25;
    }

    .panel-title span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .select-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    select,
    input[type="color"] {
      height: 36px;
      border: 1px solid rgba(255, 255, 255, 0.82);
      background: #ffffff;
      border-radius: 8px;
      color: var(--ink);
      box-shadow: 0 6px 16px rgba(42, 57, 86, 0.08);
    }

    select {
      padding: 0 34px 0 10px;
      max-width: 170px;
    }

    input[type="color"] {
      width: 42px;
      padding: 4px;
      cursor: pointer;
    }

    .editor-wrap {
      min-height: 0;
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
    }

    .quick-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 8px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.82);
    }

    .tool-btn {
      min-height: 32px;
      border: 1px solid rgba(217, 227, 238, 0.92);
      background: #ffffff;
      color: var(--ink);
      border-radius: 8px;
      padding: 0 10px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 5px 12px rgba(42, 57, 86, 0.06);
    }

    .tool-btn:hover {
      border-color: rgba(0, 168, 135, 0.42);
    }

    .tool-btn svg {
      width: 15px;
      height: 15px;
    }

    textarea {
      width: 100%;
      min-height: 420px;
      height: 100%;
      resize: none;
      border: 1px solid rgba(255, 255, 255, 0.88);
      border-radius: 8px;
      background: #ffffff;
      color: #1d2733;
      padding: 18px;
      line-height: 1.72;
      outline: none;
      box-shadow: 0 14px 30px rgba(42, 57, 86, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    textarea:focus {
      border-color: rgba(0, 168, 135, 0.72);
      box-shadow: 0 0 0 3px rgba(0, 168, 135, 0.12), 0 14px 30px rgba(42, 57, 86, 0.08);
    }

    .stats {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 34px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      flex-wrap: wrap;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 8px;
      padding: 8px 10px;
    }

    .stats strong {
      color: var(--ink);
      font-weight: 600;
    }

    .mini-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .mini-btn {
      min-height: 30px;
      border: 1px solid rgba(255, 255, 255, 0.86);
      background: #ffffff;
      color: var(--ink);
      border-radius: 8px;
      padding: 0 10px;
      cursor: pointer;
      box-shadow: 0 5px 12px rgba(42, 57, 86, 0.08);
    }

    .mini-btn:hover {
      border-color: rgba(255, 107, 87, 0.48);
    }

    .preview-area {
      min-height: 0;
      overflow: auto;
      padding: 26px;
      background:
        linear-gradient(90deg, rgba(0, 168, 135, 0.12) 0 12px, transparent 12px 28px, rgba(255, 212, 90, 0.15) 28px 40px, transparent 40px 56px),
        linear-gradient(180deg, #fffefe 0%, #f2fbff 52%, #fff7f8 100%);
      background-size: 56px 100%, auto;
      border: 1px solid rgba(255, 255, 255, 0.76);
      border-left: 0;
    }

    .phone {
      width: min(100%, 430px);
      margin: 0 auto;
      border-radius: 28px;
      padding: 12px;
      background:
        linear-gradient(135deg, #182230 0%, #27364a 64%),
        linear-gradient(90deg, #00a887, #ffd45a, #ff6b57, #40a9ff);
      border: 6px solid transparent;
      background-clip: padding-box, border-box;
      background-origin: padding-box, border-box;
      box-shadow: var(--shadow);
    }

    .screen {
      border-radius: 20px;
      overflow: hidden;
      background: #ffffff;
      min-height: 620px;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .wechat-chrome {
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-bottom: 1px solid #edf0f4;
      color: #2d3745;
      font-size: 14px;
      background: linear-gradient(90deg, #f2fffb, #fff8df, #fff3f1);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #ff6b57;
      box-shadow: 13px 0 0 #ffd45a, 26px 0 0 #00a887;
    }

    #preview {
      padding: 0;
      overflow-wrap: anywhere;
    }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      max-width: min(420px, calc(100vw - 44px));
      padding: 13px 15px;
      border-radius: 8px;
      background: #182230;
      color: #ffffff;
      box-shadow: var(--shadow);
      transform: translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 10;
      font-size: 14px;
      line-height: 1.45;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .hidden-copy {
      position: fixed;
      left: 0;
      top: 0;
      width: 420px;
      max-height: 420px;
      overflow: hidden;
      background: #fff;
      opacity: 0.01;
      pointer-events: none;
      z-index: -1;
    }

    @media (max-width: 920px) {
      .topbar {
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      .command-center {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: stretch;
      }

      .actions .btn.primary {
        flex: 1;
      }

      .shell {
        grid-template-columns: 1fr;
        padding: 0 12px 16px;
      }

      .panel.editor {
        border-right: 0;
        border-bottom: 1px solid rgba(216, 222, 232, 0.95);
      }

      textarea {
        height: 46vh;
        min-height: 320px;
      }

      .preview-area {
        padding: 18px 12px 28px;
        border-left: 1px solid rgba(255, 255, 255, 0.76);
      }
    }

    @media (max-width: 560px) {
      .topbar {
        padding: 14px;
      }

      .command-center {
        padding: 12px;
      }

      .workflow {
        grid-template-columns: 1fr;
      }

      .template-dock {
        grid-template-columns: 1fr;
      }

      .template-chips {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .ai-action {
        width: 100%;
      }

      .subtitle {
        white-space: normal;
      }

      .panel-head {
        align-items: stretch;
        flex-direction: column;
      }

      .select-wrap {
        justify-content: flex-start;
      }

      select {
        max-width: none;
        flex: 1;
      }

      .btn span {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M5 4.5h14M5 9h14M5 13.5h9M5 18h7" stroke="currentColor" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <h1>公众号一键排版</h1>
          <p class="subtitle">写好文章，选好风格，复制后直接粘贴到公众号编辑器。</p>
        </div>
      </div>
      <div class="actions">
        <button class="btn ghost" id="sampleBtn" title="填入示例" aria-label="填入示例">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 3v18M3 12h18" stroke="currentColor" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="btn ghost" id="clearBtn" title="清空内容" aria-label="清空内容">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M4 7h16M10 11v6M14 11v6M6 7l1 13h10l1-13M9 7V4h6v3" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="btn" id="htmlBtn" title="查看公众号 HTML">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="m8 9-4 3 4 3M16 9l4 3-4 3M14 5l-4 14" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>HTML</span>
        </button>
        <button class="btn" id="copySourceBtn" title="复制 HTML 源码">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M8 7h8M8 12h8M8 17h5" stroke="currentColor" stroke-linecap="round"/>
            <rect x="4" y="3" width="16" height="18" rx="2" stroke="currentColor"/>
          </svg>
          <span>源码</span>
        </button>
        <button class="btn primary" id="copyBtn">
          <svg viewBox="0 0 24 24" fill="none">
            <rect x="9" y="9" width="10" height="10" rx="2" stroke="currentColor"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-linecap="round"/>
          </svg>
          <span>复制到公众号</span>
        </button>
      </div>
    </header>

    <section class="command-center" aria-label="排版工作台">
      <div class="workflow">
        <div class="step-card">
          <strong>1. 写入内容</strong>
          <span>粘贴文章或 Markdown</span>
        </div>
        <div class="step-card">
          <strong>2. 选风格</strong>
          <span>模板、主题色、字号</span>
        </div>
        <div class="step-card">
          <strong>3. 复制发布</strong>
          <span>粘贴到公众号后台</span>
        </div>
      </div>
      <div class="template-dock">
        <div class="dock-title">
          <strong>一键风格</strong>
          <span>点击即套用</span>
        </div>
        <div class="template-chips" aria-label="模板快捷选择">
          <button class="template-chip active" data-template-chip="clean" style="--chip: linear-gradient(90deg, #00a887, #40a9ff);"><i></i><span>清爽阅读</span></button>
          <button class="template-chip" data-template-chip="business" style="--chip: linear-gradient(90deg, #2f6fed, #8e6cff);"><i></i><span>商务简报</span></button>
          <button class="template-chip" data-template-chip="warm" style="--chip: linear-gradient(90deg, #ffd45a, #ff9a57);"><i></i><span>温和叙事</span></button>
          <button class="template-chip" data-template-chip="bold" style="--chip: linear-gradient(90deg, #ff6b57, #ff3d8b);"><i></i><span>醒目营销</span></button>
        </div>
        <button class="ai-action" id="polishBtn">智能清稿</button>
      </div>
    </section>

    <section class="shell">
      <section class="panel editor">
        <div class="panel-head">
          <div class="panel-title">
            <strong>文章内容</strong>
            <span>支持标题、引用、列表、分割线和重点标记</span>
          </div>
          <div class="select-wrap">
            <select id="templateSelect" aria-label="选择模板">
              <option value="clean">清爽阅读</option>
              <option value="business">商务简报</option>
              <option value="warm">温和叙事</option>
              <option value="bold">醒目营销</option>
            </select>
            <input id="colorInput" type="color" value="#0f8f72" aria-label="主题色">
          </div>
        </div>
        <div class="editor-wrap">
          <div class="quick-toolbar" aria-label="常用排版工具">
            <button class="tool-btn" data-insert="# 小标题\n\n">
              <svg viewBox="0 0 24 24" fill="none"><path d="M5 5v14M19 5v14M5 12h14" stroke="currentColor" stroke-linecap="round"/></svg>
              小标题
            </button>
            <button class="tool-btn" data-insert="> 这里写重点引用\n\n">
              <svg viewBox="0 0 24 24" fill="none"><path d="M8 7H5v6h4v4l3-4V7H8ZM18 7h-3v6h4v4l3-4V7h-4Z" stroke="currentColor" stroke-linejoin="round"/></svg>
              引用
            </button>
            <button class="tool-btn" data-insert="- 要点一\n- 要点二\n- 要点三\n\n">
              <svg viewBox="0 0 24 24" fill="none"><path d="M9 7h10M9 12h10M9 17h10M5 7h.01M5 12h.01M5 17h.01" stroke="currentColor" stroke-linecap="round"/></svg>
              列表
            </button>
            <button class="tool-btn" data-insert="\n---\n\n">
              <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14" stroke="currentColor" stroke-linecap="round"/></svg>
              分割线
            </button>
            <button class="tool-btn" data-insert="**重点内容**">
              <svg viewBox="0 0 24 24" fill="none"><path d="M7 5h6a4 4 0 0 1 0 8H7V5Zm0 8h7a3 3 0 0 1 0 6H7v-6Z" stroke="currentColor" stroke-linejoin="round"/></svg>
              加粗
            </button>
          </div>
          <textarea id="editor" spellcheck="false"></textarea>
          <div class="stats">
            <div id="statsText">0 字 · 0 段 · 约 0 分钟</div>
            <div class="mini-actions">
              <button class="mini-btn" id="saveBtn">保存草稿</button>
              <button class="mini-btn" id="restoreBtn">恢复草稿</button>
              <button class="mini-btn" id="imageBtn">插入图片</button>
            </div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div class="panel-title">
            <strong>公众号预览</strong>
            <span>右侧效果会随输入和模板实时更新</span>
          </div>
          <div class="select-wrap">
            <select id="fontSelect" aria-label="正文字号">
              <option value="15">15px</option>
              <option value="16" selected>16px</option>
              <option value="17">17px</option>
            </select>
          </div>
        </div>
        <div class="preview-area">
          <div class="phone">
            <div class="screen">
              <div class="wechat-chrome"><span class="dot"></span><span>订阅号文章</span></div>
              <article id="preview"></article>
            </div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="copyHost" class="hidden-copy" contenteditable="true" tabindex="-1"></div>

  <script>
    const sampleText = `# 怎样把一篇文章排成公众号成稿

写公众号最耗时间的地方，常常不是写作本身，而是最后那一段反复调样式的细活。

## 先把结构理顺

一篇适合移动端阅读的文章，最好先拆成清楚的段落和小标题。每个小节只解决一个问题，读者扫一眼就知道自己在哪里。

> 好的排版不是让文章变花，而是让阅读阻力变小。

## 可以这样处理

- 标题负责抓住主题
- 小标题负责建立节奏
- 引用负责强调关键判断
- 列表负责承载步骤和要点

1. 先写正文
2. 再选模板
3. 最后复制粘贴

![排版示例](https://images.unsplash.com/photo-1499750310107-5fef28a66643?auto=format&fit=crop&w=1200&q=80)

---

## 最后再统一风格

选定模板之后，字号、行距、重点色和分割线都应该保持一致。这样粘贴到公众号后台时，文章看起来就是一篇完整的成稿。

**重点提醒：** 复制后请到公众号编辑器正文区域直接粘贴，再用手机预览检查一次。`;

    const state = {
      markdown: sampleText,
      template: "clean",
      accent: "#0f8f72",
      fontSize: 16,
      html: "",
      nodes: []
    };

    const draftKey = "wechat-layout-tool-draft-v2";

    const editor = document.getElementById("editor");
    const preview = document.getElementById("preview");
    const templateSelect = document.getElementById("templateSelect");
    const colorInput = document.getElementById("colorInput");
    const fontSelect = document.getElementById("fontSelect");
    const copyBtn = document.getElementById("copyBtn");
    const sampleBtn = document.getElementById("sampleBtn");
    const clearBtn = document.getElementById("clearBtn");
    const htmlBtn = document.getElementById("htmlBtn");
    const copySourceBtn = document.getElementById("copySourceBtn");
    const saveBtn = document.getElementById("saveBtn");
    const restoreBtn = document.getElementById("restoreBtn");
    const imageBtn = document.getElementById("imageBtn");
    const polishBtn = document.getElementById("polishBtn");
    const statsText = document.getElementById("statsText");
    const toast = document.getElementById("toast");
    const copyHost = document.getElementById("copyHost");
    const templateChips = Array.from(document.querySelectorAll("[data-template-chip]"));
    const toolButtons = Array.from(document.querySelectorAll("[data-insert]"));

    const templateMap = {
      clean: {
        text: "#26323f",
        muted: "#6b7280",
        background: "#ffffff",
        block: "#f4faf8",
        border: "1px solid rgba(15, 143, 114, 0.22)",
        heading: "border-left",
        radius: "8px"
      },
      business: {
        text: "#1f2937",
        muted: "#667085",
        background: "#ffffff",
        block: "#f6f8fb",
        border: "1px solid #d7dde6",
        heading: "topline",
        radius: "4px"
      },
      warm: {
        text: "#332d2a",
        muted: "#7a6d66",
        background: "#fffdf9",
        block: "#fff3ea",
        border: "1px solid #f0d8c6",
        heading: "pill",
        radius: "8px"
      },
      bold: {
        text: "#20242b",
        muted: "#646b76",
        background: "#ffffff",
        block: "#fff6f4",
        border: "1px solid rgba(226, 85, 68, 0.26)",
        heading: "badge",
        radius: "6px"
      }
    };

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function inlineText(value) {
      return escapeHtml(value)
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/`(.+?)`/g, "<code style=\"font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; background: rgba(15, 143, 114, 0.08); padding: 2px 5px; border-radius: 4px;\">$1</code>");
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replace(/'/g, "&#39;");
    }

    function parseMarkdown(input) {
      const lines = input.replace(/\r\n/g, "\n").split("\n");
      const nodes = [];
      let paragraph = [];
      let list = [];
      let orderedList = [];

      function flushParagraph() {
        if (paragraph.length) {
          nodes.push({ type: "paragraph", text: paragraph.join(" ") });
          paragraph = [];
        }
      }

      function flushList() {
        if (list.length) {
          nodes.push({ type: "list", items: list });
          list = [];
        }
        if (orderedList.length) {
          nodes.push({ type: "ordered-list", items: orderedList });
          orderedList = [];
        }
      }

      for (const raw of lines) {
        const line = raw.trim();
        if (!line) {
          flushParagraph();
          flushList();
          continue;
        }

        if (/^---+$/.test(line)) {
          flushParagraph();
          flushList();
          nodes.push({ type: "divider" });
          continue;
        }

        const heading = /^(#{1,3})\s+(.+)$/.exec(line);
        if (heading) {
          flushParagraph();
          flushList();
          nodes.push({ type: heading[1].length === 1 ? "title" : "heading", level: heading[1].length, text: heading[2] });
          continue;
        }

        const image = /^!\[(.*?)\]\((.*?)\)$/.exec(line);
        if (image) {
          flushParagraph();
          flushList();
          nodes.push({ type: "image", alt: image[1], src: image[2] });
          continue;
        }

        if (line.startsWith(">")) {
          flushParagraph();
          flushList();
          nodes.push({ type: "quote", text: line.replace(/^>\s?/, "") });
          continue;
        }

        const bullet = /^[-*]\s+(.+)$/.exec(line);
        if (bullet) {
          flushParagraph();
          list.push(bullet[1]);
          continue;
        }

        const ordered = /^\d+[.)]\s+(.+)$/.exec(line);
        if (ordered) {
          flushParagraph();
          orderedList.push(ordered[1]);
          continue;
        }

        paragraph.push(line);
      }

      flushParagraph();
      flushList();
      return nodes;
    }

    function renderTitle(text, theme) {
      return `<h1 style="margin: 0 0 10px; color: ${theme.text}; font-size: 24px; line-height: 1.34; font-weight: 700; letter-spacing: 0;">${inlineText(text)}</h1>`;
    }

    function renderHeading(node, theme, accent) {
      const text = inlineText(node.text);
      if (theme.heading === "topline") {
        return `<section style="margin: 30px 0 14px; padding-top: 12px; border-top: 3px solid ${accent};"><h2 style="margin: 0; color: ${theme.text}; font-size: 18px; line-height: 1.45; font-weight: 700;">${text}</h2></section>`;
      }
      if (theme.heading === "pill") {
        return `<section style="margin: 30px 0 14px;"><h2 style="display: inline-block; margin: 0; padding: 6px 13px; color: #ffffff; background: ${accent}; border-radius: 999px; font-size: 17px; line-height: 1.45; font-weight: 700;">${text}</h2></section>`;
      }
      if (theme.heading === "badge") {
        return `<section style="margin: 30px 0 14px; display: block;"><h2 style="margin: 0; color: ${theme.text}; font-size: 18px; line-height: 1.45; font-weight: 800;"><span style="display: inline-block; width: 20px; height: 20px; margin-right: 8px; text-align: center; line-height: 20px; color: #ffffff; background: ${accent}; border-radius: 4px; font-size: 13px;">#</span>${text}</h2></section>`;
      }
      return `<h2 style="margin: 30px 0 14px; padding-left: 12px; border-left: 4px solid ${accent}; color: ${theme.text}; font-size: 18px; line-height: 1.45; font-weight: 700;">${text}</h2>`;
    }

    function renderWechatHtml(nodes, options) {
      const theme = templateMap[options.template];
      const accent = options.accent;
      const fontSize = Number(options.fontSize);
      const pieces = [];

      for (const node of nodes) {
        if (node.type === "title") {
          pieces.push(renderTitle(node.text, theme));
        }

        if (node.type === "heading") {
          pieces.push(renderHeading(node, theme, accent));
        }

        if (node.type === "paragraph") {
          pieces.push(`<p style="margin: 16px 0; color: ${theme.text}; font-size: ${fontSize}px; line-height: 1.86; letter-spacing: 0; text-align: justify;">${inlineText(node.text)}</p>`);
        }

        if (node.type === "quote") {
          pieces.push(`<blockquote style="margin: 18px 0; padding: 14px 16px; color: ${theme.text}; background: ${theme.block}; border-left: 4px solid ${accent}; border-radius: ${theme.radius}; font-size: ${fontSize}px; line-height: 1.8;">${inlineText(node.text)}</blockquote>`);
        }

        if (node.type === "list") {
          const items = node.items.map((item) => `<li style="margin: 8px 0; padding-left: 2px;">${inlineText(item)}</li>`).join("");
          pieces.push(`<ul style="margin: 16px 0; padding-left: 22px; color: ${theme.text}; font-size: ${fontSize}px; line-height: 1.82;">${items}</ul>`);
        }

        if (node.type === "ordered-list") {
          const items = node.items.map((item) => `<li style="margin: 8px 0; padding-left: 2px;">${inlineText(item)}</li>`).join("");
          pieces.push(`<ol style="margin: 16px 0; padding-left: 22px; color: ${theme.text}; font-size: ${fontSize}px; line-height: 1.82;">${items}</ol>`);
        }

        if (node.type === "image") {
          pieces.push(`<section style="margin: 20px 0; text-align: center;"><img src="${escapeAttribute(node.src)}" alt="${escapeAttribute(node.alt)}" style="display: block; width: 100%; max-width: 100%; height: auto; border-radius: ${theme.radius}; margin: 0 auto;"><span style="display: block; margin-top: 8px; color: ${theme.muted}; font-size: 12px; line-height: 1.5;">${inlineText(node.alt)}</span></section>`);
        }

        if (node.type === "divider") {
          pieces.push(`<section style="margin: 28px auto; width: 72px; height: 3px; border-radius: 99px; background: ${accent}; opacity: 0.72;"></section>`);
        }
      }

      return `<section style="box-sizing: border-box; max-width: 100%; padding: 24px 20px 34px; background: ${theme.background}; color: ${theme.text}; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;">${pieces.join("")}</section>`;
    }

    function update() {
      state.markdown = editor.value;
      state.template = templateSelect.value;
      state.accent = colorInput.value;
      state.fontSize = fontSelect.value;
      state.nodes = parseMarkdown(state.markdown);
      state.html = renderWechatHtml(state.nodes, state);
      preview.innerHTML = state.html;
      updateTemplateChips();
      updateStats();
      queueAutosave();
    }

    function updateTemplateChips() {
      for (const chip of templateChips) {
        chip.classList.toggle("active", chip.dataset.templateChip === state.template);
      }
    }

    function updateStats() {
      const text = plainTextFromMarkdown(state.markdown).replace(/\s+/g, "");
      const paragraphs = state.nodes.filter((node) => ["paragraph", "quote", "list", "ordered-list", "image"].includes(node.type)).length;
      const minutes = Math.max(1, Math.ceil(text.length / 450));
      statsText.innerHTML = `<strong>${text.length}</strong> 字 · <strong>${paragraphs}</strong> 段 · 约 <strong>${minutes}</strong> 分钟`;
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2600);
    }

    function plainTextFromMarkdown(input) {
      return input
        .replace(/^#{1,3}\s+/gm, "")
        .replace(/^>\s?/gm, "")
        .replace(/^[-*]\s+/gm, "• ")
        .replace(/^\d+[.)]\s+/gm, "")
        .replace(/^!\[(.*?)\]\((.*?)\)$/gm, "$1")
        .replace(/\*\*(.+?)\*\*/g, "$1")
        .replace(/`(.+?)`/g, "$1");
    }

    function fallbackCopyHtml(html) {
      copyHost.innerHTML = html;
      const target = preview.innerHTML.trim() ? preview : copyHost;
      const range = document.createRange();
      range.selectNodeContents(target);
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(range);
      const ok = document.execCommand("copy");
      selection.removeAllRanges();
      return ok;
    }

    async function copyWechatHtml() {
      update();
      if (fallbackCopyHtml(state.html)) {
        showToast("已复制排版内容。现在打开公众号编辑器，在正文区域粘贴即可。");
        return;
      }

      try {
        if (navigator.clipboard && window.ClipboardItem) {
          await navigator.clipboard.write([
            new ClipboardItem({
              "text/html": new Blob([state.html], { type: "text/html" }),
              "text/plain": new Blob([plainTextFromMarkdown(state.markdown)], { type: "text/plain" })
            })
          ]);
          showToast("已复制排版内容。现在打开公众号编辑器，在正文区域粘贴即可。");
          return;
        }
      } catch (error) {
        console.warn(error);
      }

      showToast("浏览器阻止了复制，请点 HTML 查看源码后手动复制。");
    }

    async function copySource() {
      update();
      try {
        await navigator.clipboard.writeText(state.html);
        showToast("HTML 源码已复制。");
      } catch (error) {
        const ok = fallbackCopyPlainText(state.html);
        showToast(ok ? "HTML 源码已复制。" : "浏览器阻止了复制，请打开 HTML 窗口手动复制。");
      }
    }

    function fallbackCopyPlainText(text) {
      const area = document.createElement("textarea");
      area.value = text;
      area.setAttribute("readonly", "");
      area.style.position = "fixed";
      area.style.left = "-9999px";
      area.style.top = "0";
      document.body.appendChild(area);
      area.select();
      const ok = document.execCommand("copy");
      document.body.removeChild(area);
      return ok;
    }

    function saveDraft(showMessage = true) {
      const payload = {
        markdown: editor.value,
        template: templateSelect.value,
        accent: colorInput.value,
        fontSize: fontSelect.value,
        savedAt: new Date().toISOString()
      };
      localStorage.setItem(draftKey, JSON.stringify(payload));
      if (showMessage) showToast("草稿已保存。");
    }

    function restoreDraft(showMissingMessage = true) {
      const raw = localStorage.getItem(draftKey);
      if (!raw) {
        if (showMissingMessage) showToast("还没有保存过草稿。");
        return;
      }
      try {
        const payload = JSON.parse(raw);
        editor.value = payload.markdown || "";
        templateSelect.value = payload.template || "clean";
        colorInput.value = payload.accent || "#0f8f72";
        fontSelect.value = payload.fontSize || "16";
        update();
        showToast("草稿已恢复。");
      } catch (error) {
        showToast("草稿读取失败。");
      }
    }

    function queueAutosave() {
      window.clearTimeout(queueAutosave.timer);
      queueAutosave.timer = window.setTimeout(() => saveDraft(false), 600);
    }

    function insertAtCursor(text) {
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      const before = editor.value.slice(0, start);
      const after = editor.value.slice(end);
      editor.value = `${before}${text}${after}`;
      editor.selectionStart = editor.selectionEnd = start + text.length;
      editor.focus();
      update();
    }

    function insertImage() {
      const url = window.prompt("图片地址");
      if (!url) return;
      const alt = window.prompt("图片说明", "图片说明") || "图片说明";
      insertAtCursor(`\n\n![${alt}](${url})\n\n`);
      showToast("图片已插入。");
    }

    function polishDraft() {
      const source = editor.value.trim();
      if (!source) {
        showToast("先写入内容，再清稿。");
        return;
      }

      const lines = source
        .replace(/\r\n/g, "\n")
        .split("\n")
        .map((line) => line.replace(/\s+$/g, ""));
      const polished = [];
      let blank = false;
      let hasTitle = lines.some((line) => /^#\s+/.test(line.trim()));

      for (const rawLine of lines) {
        const line = rawLine.trim();
        if (!line) {
          if (!blank && polished.length) polished.push("");
          blank = true;
          continue;
        }

        if (!hasTitle && polished.length === 0) {
          polished.push(`# ${line.replace(/^#+\s*/, "")}`);
          hasTitle = true;
          blank = false;
          continue;
        }

        if (/^\d+[、.]\s*/.test(line)) {
          polished.push(line.replace(/^(\d+)[、.]\s*/, "$1. "));
        } else if (/^[*-]\s*/.test(line)) {
          polished.push(line.replace(/^[*-]\s*/, "- "));
        } else {
          polished.push(rawLine.trim());
        }
        blank = false;
      }

      editor.value = polished.join("\n").replace(/\n{3,}/g, "\n\n");
      update();
      showToast("已整理段落、标题和列表格式。");
    }

    function showHtml() {
      update();
      const popup = window.open("", "_blank", "width=920,height=720");
      if (!popup) {
        showToast("浏览器拦截了新窗口。请允许弹窗后再试一次。");
        return;
      }
      popup.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>公众号 HTML</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f7fa;color:#17202a}.wrap{display:grid;grid-template-columns:1fr 1fr;min-height:100vh}.pane{padding:22px;overflow:auto}.pane:first-child{border-right:1px solid #d8dee8;background:#fff}textarea{width:100%;height:calc(100vh - 44px);resize:none;border:1px solid #d8dee8;border-radius:8px;padding:14px;line-height:1.5;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px}.preview{max-width:430px;margin:0 auto;background:#fff;box-shadow:0 14px 34px rgba(24,34,48,.12)}</style></head><body><div class="wrap"><div class="pane"><textarea readonly>${escapeHtml(state.html)}</textarea></div><div class="pane"><div class="preview">${state.html}</div></div></div></body></html>`);
      popup.document.close();
    }

    editor.value = state.markdown;
    editor.addEventListener("input", update);
    templateSelect.addEventListener("change", update);
    colorInput.addEventListener("input", update);
    fontSelect.addEventListener("change", update);
    copyBtn.addEventListener("click", copyWechatHtml);
    copySourceBtn.addEventListener("click", copySource);
    saveBtn.addEventListener("click", () => saveDraft(true));
    restoreBtn.addEventListener("click", () => restoreDraft(true));
    imageBtn.addEventListener("click", insertImage);
    polishBtn.addEventListener("click", polishDraft);
    for (const chip of templateChips) {
      chip.addEventListener("click", () => {
        templateSelect.value = chip.dataset.templateChip;
        update();
        showToast(`已切换为${chip.textContent.trim()}。`);
      });
    }
    for (const button of toolButtons) {
      button.addEventListener("click", () => insertAtCursor(button.dataset.insert));
    }
    sampleBtn.addEventListener("click", () => {
      editor.value = sampleText;
      update();
      showToast("示例内容已填入。");
    });
    clearBtn.addEventListener("click", () => {
      editor.value = "";
      update();
      editor.focus();
      showToast("内容已清空。");
    });
    htmlBtn.addEventListener("click", showHtml);
    restoreDraft(false);
    update();
  </script>
</body>
</html>
